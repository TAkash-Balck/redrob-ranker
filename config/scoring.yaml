# ─── Experience band cutoffs ────────────────────────────────
experience_bands:
  too_junior_max:       3.0    # score = 0.15
  borderline_max:       5.0    # score = 0.55
  target_min:           5.0    # score = 1.00
  target_max:           9.0    # score = 1.00
  slightly_senior_max:  12.0   # score = 0.75
  # else: 0.45

# ─── Location scoring ────────────────────────────────────────
preferred_locations:          ["noida", "pune"]
acceptable_locations:         ["gurgaon", "gurugram", "delhi", "ncr", "new delhi"]
good_locations:               ["hyderabad", "mumbai", "bangalore", "bengaluru", "chennai"]

# ─── Behavioral multiplier config ───────────────────────────
behavioral:
  recency_thresholds:
    excellent:  14    # days → 1.00
    good:       30    # days → 0.95
    ok:         90    # days → 0.80
    poor:       180   # days → 0.55
    # else 0.25

  availability:
    open_to_work:     1.00
    not_open:         0.75

  responsiveness_floor:  0.40   # floor(0.4 + 0.6 × rate)

  notice_thresholds:
    immediate:  30    # days → 1.00
    short:      60    # days → 0.88
    medium:     90    # days → 0.72
    # else 0.50

  github_bonus_thresholds:
    high:   60    # score → 1.05
    medium: 30    # score → 1.00
    none:   -1    # linked=no → 0.95
    # else (0–29) → 0.92

# ─── Honeypot detection thresholds ──────────────────────────
honeypot:
  timeline_multiplier:  1.25   # career months > yoe*12*1.25
  max_expert_zero:      2      # expert skills with 0 months duration
  max_expert_skills:    8      # total expert skills

# ─── Output settings ─────────────────────────────────────────
output:
  top_k:            100    # final submission rows
  keep_buffer:      300    # in-memory heap size during processing
  chunksize:        500    # multiprocessing chunksize
  normalize_scores: true   # normalize final scores to 0–1

# ─── Skill scoring weights ───────────────────────────────────
skill_scoring:
  duration_cap_months:  24    # caps at 2 years
  endorsement_cap:      20
  proficiency_weights:
    beginner:      0.3
    intermediate:  0.7
    advanced:      1.0
    expert:        1.2
